kind = "web"
previewPath = "/"
title = "ArogyaLive"
version = "1.0.0"
id = "artifacts/arogya-live"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21291

[services.development]
run = "pnpm --filter @workspace/arogya-live run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arogya-live", "run", "build" ]
publicDir = "artifacts/arogya-live/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21291"
BASE_PATH = "/"
