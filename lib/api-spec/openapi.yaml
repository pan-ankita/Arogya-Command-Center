openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ArogyaLive API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: facilities
    description: PHC/CHC facilities
  - name: medicines
    description: Medicine catalog
  - name: stock
    description: Stock management
  - name: footfall
    description: Patient footfall
  - name: beds
    description: Bed availability
  - name: doctors
    description: Doctor management
  - name: attendance
    description: Doctor attendance
  - name: tests
    description: Diagnostic tests
  - name: calamity
    description: Calamity alerts
  - name: redistribution
    description: Resource redistribution
  - name: alerts
    description: System alerts
  - name: ai
    description: AI features

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /facilities:
    get:
      operationId: getFacilities
      tags: [facilities]
      summary: List all facilities
      responses:
        "200":
          description: List of facilities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Facility"

  /facilities/{id}:
    get:
      operationId: getFacility
      tags: [facilities]
      summary: Get facility by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Facility
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Facility"

  /facilities/{id}/health-score:
    get:
      operationId: getFacilityHealthScore
      tags: [facilities]
      summary: Get composite health score for a facility
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Health score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthScore"

  /facilities/district-summary:
    get:
      operationId: getDistrictSummary
      tags: [facilities]
      summary: District-wide summary stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistrictSummary"

  /medicines:
    get:
      operationId: getMedicines
      tags: [medicines]
      summary: List all medicines
      responses:
        "200":
          description: List of medicines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Medicine"

  /stock:
    get:
      operationId: getStock
      tags: [stock]
      summary: Get stock records for a facility
      parameters:
        - name: facilityId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Stock records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockRecord"

  /stock/transaction:
    post:
      operationId: createStockTransaction
      tags: [stock]
      summary: Log a stock transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StockTransactionInput"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockRecord"

  /footfall:
    get:
      operationId: getFootfall
      tags: [footfall]
      summary: Get footfall records
      parameters:
        - name: facilityId
          in: query
          required: true
          schema:
            type: integer
        - name: days
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Footfall records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FootfallRecord"

  /footfall/log:
    post:
      operationId: logFootfall
      tags: [footfall]
      summary: Log patient footfall
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FootfallInput"
      responses:
        "201":
          description: Logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FootfallRecord"

  /beds:
    get:
      operationId: getBeds
      tags: [beds]
      summary: Get bed availability for a facility
      parameters:
        - name: facilityId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bed records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BedRecord"

  /beds/{id}:
    patch:
      operationId: updateBed
      tags: [beds]
      summary: Update bed occupancy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BedUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BedRecord"

  /doctors:
    get:
      operationId: getDoctors
      tags: [doctors]
      summary: Get doctors for a facility
      parameters:
        - name: facilityId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Doctors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Doctor"

  /attendance:
    get:
      operationId: getAttendance
      tags: [attendance]
      summary: Get attendance for a facility on a date
      parameters:
        - name: facilityId
          in: query
          required: true
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"

  /attendance/mark:
    post:
      operationId: markAttendance
      tags: [attendance]
      summary: Mark doctor attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceInput"
      responses:
        "201":
          description: Marked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"

  /tests:
    get:
      operationId: getTests
      tags: [tests]
      summary: Get test availability for a facility
      parameters:
        - name: facilityId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test availability
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestAvailability"

  /tests/{id}/status:
    patch:
      operationId: updateTestStatus
      tags: [tests]
      summary: Update test availability status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestAvailability"

  /calamity:
    get:
      operationId: getCalamities
      tags: [calamity]
      summary: Get active calamities
      parameters:
        - name: facilityId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Calamities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Calamity"
    post:
      operationId: declareCalamity
      tags: [calamity]
      summary: Declare a calamity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalamityInput"
      responses:
        "201":
          description: Declared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calamity"

  /calamity/{id}/resolve:
    post:
      operationId: resolveCalamity
      tags: [calamity]
      summary: Resolve a calamity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calamity"

  /redistribution:
    get:
      operationId: getRedistributionRecommendations
      tags: [redistribution]
      summary: Get redistribution recommendations
      responses:
        "200":
          description: Recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RedistributionRecommendation"

  /redistribution/generate:
    post:
      operationId: generateRedistribution
      tags: [redistribution]
      summary: Generate new redistribution recommendations using AI
      responses:
        "200":
          description: Generated recommendations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RedistributionRecommendation"

  /redistribution/{id}/accept:
    post:
      operationId: acceptRedistribution
      tags: [redistribution]
      summary: Accept a redistribution recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedistributionRecommendation"

  /redistribution/{id}/reject:
    post:
      operationId: rejectRedistribution
      tags: [redistribution]
      summary: Reject a redistribution recommendation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedistributionRecommendation"

  /alerts:
    get:
      operationId: getAlerts
      tags: [alerts]
      summary: Get alerts
      parameters:
        - name: facilityId
          in: query
          schema:
            type: integer
        - name: since
          in: query
          schema:
            type: string
        - name: severity
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"

  /alerts/{id}/read:
    patch:
      operationId: markAlertRead
      tags: [alerts]
      summary: Mark alert as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /forecast/{facilityId}:
    get:
      operationId: getForecast
      tags: [ai]
      summary: Get AI-powered 7-day stock forecast for a facility
      parameters:
        - name: facilityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Forecast data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastResult"

  /assistant/query:
    post:
      operationId: queryAssistant
      tags: [ai]
      summary: Query the AI chat assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantQueryInput"
      responses:
        "200":
          description: Answer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantAnswer"

  /voice/parse:
    post:
      operationId: parseVoiceCommand
      tags: [ai]
      summary: Parse a voice command into structured action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoiceCommandInput"
      responses:
        "200":
          description: Parsed command
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceCommandResult"

  /performance-flags:
    get:
      operationId: getPerformanceFlags
      tags: [facilities]
      summary: Get performance flags for all facilities
      responses:
        "200":
          description: Performance flags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PerformanceFlag"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, name, username, role]
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [facility_staff, district_admin]
        facilityId:
          type: ["integer", "null"]
        facilityName:
          type: ["string", "null"]
        languagePref:
          type: string
          enum: [en, hi, bn]

    Facility:
      type: object
      required: [id, name, type, address, latitude, longitude]
      properties:
        id:
          type: integer
        districtId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [PHC, CHC]
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        phone:
          type: ["string", "null"]
        inchargeName:
          type: ["string", "null"]
        totalBedCapacity:
          type: integer
        healthStatus:
          type: ["string", "null"]
          enum: [healthy, watch, critical, null]
        hasActiveCalamity:
          type: boolean
        createdAt:
          type: string

    HealthScore:
      type: object
      required: [facilityId, score, status]
      properties:
        facilityId:
          type: integer
        score:
          type: number
        status:
          type: string
          enum: [healthy, watch, critical]
        breakdown:
          type: object
          properties:
            stockReliability:
              type: number
            bedStress:
              type: number
            doctorAttendance:
              type: number
            testReadiness:
              type: number
            footfallOverload:
              type: number

    DistrictSummary:
      type: object
      required: [totalFacilities, redCount, amberCount, greenCount, activeCalamities, pendingRedistributions, unreadAlerts]
      properties:
        totalFacilities:
          type: integer
        redCount:
          type: integer
        amberCount:
          type: integer
        greenCount:
          type: integer
        activeCalamities:
          type: integer
        pendingRedistributions:
          type: integer
        unreadAlerts:
          type: integer
        totalBedsAvailable:
          type: integer
        totalBedsOccupied:
          type: integer
        todayFootfall:
          type: integer

    Medicine:
      type: object
      required: [id, name, category, unit]
      properties:
        id:
          type: integer
        name:
          type: string
        category:
          type: string
        unit:
          type: string
        reorderThresholdDays:
          type: integer

    StockRecord:
      type: object
      required: [id, facilityId, medicineId, medicineName, currentQuantity, unit]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        medicineId:
          type: integer
        medicineName:
          type: string
        category:
          type: string
        currentQuantity:
          type: number
        unit:
          type: string
        avgDailyConsumption:
          type: number
        daysRemaining:
          type: ["number", "null"]
        lastUpdatedAt:
          type: string
        stockStatus:
          type: string
          enum: [ok, low, critical, out]

    StockTransactionInput:
      type: object
      required: [facilityId, medicineId, type, quantity]
      properties:
        facilityId:
          type: integer
        medicineId:
          type: integer
        type:
          type: string
          enum: [restock, consumption, transfer_in, transfer_out]
        quantity:
          type: number
        note:
          type: string

    FootfallRecord:
      type: object
      required: [id, facilityId, department, count, logDate]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        department:
          type: string
        count:
          type: integer
        logDate:
          type: string
        createdAt:
          type: string

    FootfallInput:
      type: object
      required: [facilityId, department, count]
      properties:
        facilityId:
          type: integer
        department:
          type: string
        count:
          type: integer
        logDate:
          type: string

    BedRecord:
      type: object
      required: [id, facilityId, wardName, totalBeds, occupiedBeds]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        wardName:
          type: string
        totalBeds:
          type: integer
        occupiedBeds:
          type: integer
        availableBeds:
          type: integer
        lastUpdatedAt:
          type: string

    BedUpdate:
      type: object
      required: [occupiedBeds]
      properties:
        occupiedBeds:
          type: integer

    Doctor:
      type: object
      required: [id, facilityId, name, specialization]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        name:
          type: string
        specialization:
          type: string
        scheduledDays:
          type: string

    AttendanceRecord:
      type: object
      required: [id, doctorId, facilityId, attendanceDate, status]
      properties:
        id:
          type: integer
        doctorId:
          type: integer
        facilityId:
          type: integer
        doctorName:
          type: string
        attendanceDate:
          type: string
        status:
          type: string
          enum: [present, absent, late]
        checkInTime:
          type: ["string", "null"]

    AttendanceInput:
      type: object
      required: [doctorId, facilityId, status]
      properties:
        doctorId:
          type: integer
        facilityId:
          type: integer
        status:
          type: string
          enum: [present, absent, late]
        checkInTime:
          type: string
        attendanceDate:
          type: string

    TestAvailability:
      type: object
      required: [id, facilityId, testId, testName, status]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        testId:
          type: integer
        testName:
          type: string
        category:
          type: string
        status:
          type: string
          enum: [available, unavailable, equipment_down]
        lastCheckedAt:
          type: ["string", "null"]

    TestStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [available, unavailable, equipment_down]

    Calamity:
      type: object
      required: [id, facilityId, type, severity, isActive]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        facilityName:
          type: ["string", "null"]
        type:
          type: string
          enum: [flood, fire, outbreak, infrastructure, other]
        severity:
          type: string
          enum: [low, medium, high]
        description:
          type: ["string", "null"]
        isActive:
          type: boolean
        triggeredAt:
          type: string
        resolvedAt:
          type: ["string", "null"]

    CalamityInput:
      type: object
      required: [facilityId, type, severity]
      properties:
        facilityId:
          type: integer
        type:
          type: string
          enum: [flood, fire, outbreak, infrastructure, other]
        severity:
          type: string
          enum: [low, medium, high]
        description:
          type: string

    RedistributionRecommendation:
      type: object
      required: [id, resourceType, sourceFacilityId, targetFacilityId, suggestedQuantity, status, priority]
      properties:
        id:
          type: integer
        resourceType:
          type: string
        medicineId:
          type: ["integer", "null"]
        medicineName:
          type: ["string", "null"]
        sourceFacilityId:
          type: integer
        sourceFacilityName:
          type: string
        targetFacilityId:
          type: integer
        targetFacilityName:
          type: string
        suggestedQuantity:
          type: number
        distanceKm:
          type: ["number", "null"]
        reasoningText:
          type: ["string", "null"]
        priority:
          type: string
          enum: [normal, high, critical]
        status:
          type: string
          enum: [pending, accepted, rejected, completed]
        generatedAt:
          type: string

    Alert:
      type: object
      required: [id, type, severity, message, isRead, createdAt]
      properties:
        id:
          type: integer
        facilityId:
          type: ["integer", "null"]
        facilityName:
          type: ["string", "null"]
        type:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        message:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string

    ForecastMedicine:
      type: object
      required: [medicineId, medicineName, currentStock, daysRemaining, forecastData]
      properties:
        medicineId:
          type: integer
        medicineName:
          type: string
        currentStock:
          type: number
        daysRemaining:
          type: ["number", "null"]
        forecastData:
          type: array
          items:
            type: object
            properties:
              date:
                type: string
              projected:
                type: number
        aiInsight:
          type: ["string", "null"]
        riskLevel:
          type: string
          enum: [ok, watch, critical]

    ForecastResult:
      type: object
      required: [facilityId, facilityName, medicines]
      properties:
        facilityId:
          type: integer
        facilityName:
          type: string
        medicines:
          type: array
          items:
            $ref: "#/components/schemas/ForecastMedicine"

    AssistantQueryInput:
      type: object
      required: [question]
      properties:
        question:
          type: string

    AssistantAnswer:
      type: object
      required: [answer]
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: string

    VoiceCommandInput:
      type: object
      required: [transcript, facilityId]
      properties:
        transcript:
          type: string
        facilityId:
          type: integer
        language:
          type: string

    VoiceCommandResult:
      type: object
      required: [action, confidence]
      properties:
        action:
          type: string
          enum: [add_stock, log_consumption, log_footfall, update_beds, mark_attendance, unknown]
        medicineName:
          type: ["string", "null"]
        medicineId:
          type: ["integer", "null"]
        quantity:
          type: ["number", "null"]
        department:
          type: ["string", "null"]
        count:
          type: ["integer", "null"]
        confidence:
          type: number
        rawTranscript:
          type: string

    PerformanceFlag:
      type: object
      required: [id, facilityId, compositeScore, status]
      properties:
        id:
          type: integer
        facilityId:
          type: integer
        facilityName:
          type: string
        compositeScore:
          type: number
        reasonBreakdown:
          type: object
        status:
          type: string
          enum: [healthy, watch, critical]
        flaggedAt:
          type: string
